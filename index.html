<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Notes</title>
</head>
<body>
<div id="app"></div>
<header class="header">
    <div class="header-container">
        <img src="assets/logo.png" alt="logo">
        <div class="header-text">
            <img src="assets/icon/notes.png" alt="notes">
            <span>Всего заметок: 5</span>
        </div>
    </div>
</header>
<main>
    <div class="form-container">
        <form class="note-form" name="notes">
            <div class="input-form">
                <label>Название заметки</label>
                <input type="text" placeholder="Напишите название новой заметки...">
            </div>
            <div class="form-wrapper">
                <div class="textarea-form">
                    <label>Описание новой заметки</label>
                    <textarea placeholder="Напишите описание новой заметки..."></textarea>
                </div>
                <div class="submit-form">
                    <div class="list-wrapper">
                        <label>Выберите цвет заметки</label>
                        <ul>
                            <li><div class="circle yellow"></div></li>
                            <li><div class="circle green"></div></li>
                            <li><div class="circle blue"></div></li>
                            <li><div class="circle red"></div></li>
                            <li><div class="circle purple"></div></li>
                        </ul>
                    </div>
                    <button class="btn">
                        <img src="assets/icon/plus-svgrepo-com%201.png">
                        Добавить заметку
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="filter-box">
        <!-- Ваш код -->
    </div>
    <ul class="notes-list">
        <!-- Сюда будут рендерится заметки из JavaScript -->
    </ul>

    <div class="messages-box">
        <!-- Сюда будут рендерится информационные сообщения из JavaScript -->
    </div>
</main>

<script src="main.js"></script>
</body>
</html>
